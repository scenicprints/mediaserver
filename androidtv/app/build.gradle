plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.scenicprints.marquee'
    compileSdk 34

    defaultConfig {
        applicationId 'com.scenicprints.marquee'
        minSdk 23
        targetSdk 34
        // Bumped per build in CI (-PappVersionCode=<run number>); the in-app
        // self-updater compares this against the published version.json.
        versionCode (project.hasProperty('appVersionCode') ? project.appVersionCode.toInteger() : 1)
        versionName (project.hasProperty('appVersionName') ? project.appVersionName.toString() : '1.0')

        // libVLC ships native decoders per-ABI. TVs and Android projectors are
        // ARM; dropping x86 halves the APK the self-updater has to download.
        ndk { abiFilters 'armeabi-v7a', 'arm64-v8a' }
    }

    // Fixed keystore (committed by CI on first run) so every build is signed with
    // the SAME key — required for the app to update itself over the old install.
    signingConfigs {
        release {
            def ks = rootProject.file('keystore/marquee.jks')
            if (ks.exists()) {
                storeFile ks
                storePassword 'marquee'
                keyAlias 'marquee'
                keyPassword 'marquee'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            if (rootProject.file('keystore/marquee.jks').exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    // libVLC: the native player engine (same architecture as the Apple TV app's
    // VLCKit) — decodes every container/codec on-device so the server never
    // transcodes. 3.6.5: same stable 3.6 generation as the PROVEN Apple TV
    // VLCKit build, and the newest 3.x that compiles against SDK 34 (3.7.x
    // demands compileSdk 36, which this AGP 8.5 toolchain can't target).
    implementation 'org.videolan.android:libvlc-all:3.6.5'
}
