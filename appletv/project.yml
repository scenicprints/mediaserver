# XcodeGen spec — CI runs `xcodegen` to produce MarqueeTV.xcodeproj, so we never
# hand-maintain a .pbxproj. Versions are injected by CI (MARKETING_VERSION /
# CURRENT_PROJECT_VERSION) and the team id comes from a build setting.
name: MarqueeTV
options:
  bundleIdPrefix: com.scenicprints
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

# VLCKit (libVLC) via a community SPM wrapper — CI resolves this and downloads the
# prebuilt tvOS XCFramework. It lets the app DIRECT-PLAY every container/codec
# (MKV, hev1-tagged HEVC, E-AC-3, …) with no server-side remux, the way Plex/Infuse
# ship their own player. Module is `import VLCKitSPM` (exposes VLCMediaPlayer/VLCMedia).
packages:
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: "3.6.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MarqueeTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: VLCKitSPM
        product: VLCKitSPM
      # EXPLICIT AVKit link — `window.avDisplayManager` (the HDR display-mode
      # switch) is an AVKit category on UIWindow; with auto-linking it can be
      # left out of the binary and the first access crashes with "unrecognized
      # selector" (rdar 35450849). This was the 4K-HDR insta-crash: the
      # breadcrumb log died on exactly that line.
      - sdk: AVKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scenicprints.marqueetv
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        TARGETED_DEVICE_FAMILY: "3"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
