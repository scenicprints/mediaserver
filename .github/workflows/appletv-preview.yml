name: Apple TV preview shots

# Renders the REAL app in the tvOS Simulator on a cloud Mac and screenshots each
# tab — a true preview that does NOT ship to TestFlight. Runs on every push to
# appletv/ (review before shipping), plus a manual button.
# Needs secret MARQUEE_PREVIEW_TMDB (sample data from TMDB's public CDN).
on:
  push:
    paths:
      - 'appletv/**'
  workflow_dispatch:

jobs:
  shots:
    runs-on: macos-15
    defaults:
      run:
        working-directory: appletv
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"; xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build for tvOS Simulator
        run: |
          xcodebuild \
            -project MarqueeTV.xcodeproj \
            -scheme MarqueeTV \
            -sdk appletvsimulator \
            -configuration Debug \
            -destination 'generic/platform=tvOS Simulator' \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build

      - name: Boot simulator, install, screenshot each tab
        env:
          BUNDLE: com.scenicprints.marqueetv
        run: |
          set -x
          DEV=$(xcrun simctl list devices available | grep -m1 "Apple TV" | sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/')
          if [ -z "$DEV" ]; then
            RT=$(xcrun simctl list runtimes | grep -m1 tvOS | sed -E 's/.* - (com[^ ]*) .*/\1/')
            DEV=$(xcrun simctl create "Preview ATV" "Apple TV 4K (3rd generation)" "$RT")
          fi
          echo "device=$DEV"
          xcrun simctl boot "$DEV" || true
          xcrun simctl bootstatus "$DEV" -b
          APP=$(find build/dd/Build/Products -name "MarqueeTV.app" -type d | head -1)
          echo "app=$APP"
          xcrun simctl install "$DEV" "$APP"
          mkdir -p shots
          # One screenshot with retries. The sim resprings on the FIRST
          # terminate+relaunch after install, so whichever tab is captured
          # second used to deterministically photograph the tvOS boot screen.
          # Real app frames (mock posters everywhere) are >300 KB; the boot
          # screen is ~175 KB — retry small shots with a fresh relaunch.
          snap() { # $1 = output name, $2 = env var name, $3 = env var value
            for A in 1 2 3; do
              env "SIMCTL_CHILD_PREVIEW_TMDB=${{ secrets.MARQUEE_PREVIEW_TMDB }}" \
                  "SIMCTL_CHILD_$2=$3" \
                  xcrun simctl launch --terminate-running-process "$DEV" "$BUNDLE"
              sleep 24
              xcrun simctl io "$DEV" screenshot "shots/$1.png" || true
              SZ=$(stat -f%z "shots/$1.png" 2>/dev/null || echo 0)
              [ "$SZ" -ge 300000 ] && break
              echo "shot $1 looks like the boot screen ($SZ bytes) — retrying"
            done
          }
          for T in home movies tv livetv library settings; do
            # --terminate-running-process guarantees a clean relaunch that
            # re-reads PREVIEW_TAB (a plain launch just foregrounds the old
            # process, leaving it on the previous tab). Mock mode pulls sample
            # titles + real posters from TMDB's public CDN, so previews work
            # even when the media server is offline.
            snap "$T" PREVIEW_TAB "$T"
          done
          # The show-detail (seasons) screen, reached via PREVIEW_ROUTE.
          snap showdetail PREVIEW_ROUTE show
          ls -la shots

      - uses: actions/upload-artifact@v4
        with:
          name: preview-shots
          path: appletv/shots/*.png
          if-no-files-found: warn
