name: Apple TV app

# Builds the MarqueeTV tvOS app on a cloud macOS runner and uploads it to
# TestFlight, signed with an App Store Connect API key (no Mac needed locally).
#
# Requires these repo secrets (added after Apple Developer approval):
#   APPLE_TEAM_ID        - 10-char team id (App Store Connect > Membership)
#   ASC_KEY_ID           - App Store Connect API key id
#   ASC_ISSUER_ID        - App Store Connect API issuer id
#   ASC_KEY_P8_BASE64    - the AuthKey_XXXX.p8 file, base64-encoded
#
# Triggers:
#   * push to appletv/**        -> ships an update straight from your PC (git push)
#   * schedule (every 2 months) -> rebuilds so the TestFlight build never expires
#                                   (TestFlight builds lapse after 90 days)
#   * workflow_dispatch         -> manual "Run workflow" button
#
# Before the secrets exist the Preflight step makes every run pass as a no-op
# (green skip) instead of failing red, so early pushes don't spam failures.
on:
  push:
    paths:
      - 'appletv/**'
      - '.github/workflows/appletv.yml'
  schedule:
    - cron: '0 9 1 */2 *'   # 09:00 UTC on the 1st of every 2nd month (~60d < 90d)
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    defaults:
      run:
        working-directory: appletv
    steps:
      - uses: actions/checkout@v4

      # Gate the build on the signing secrets. If they're not set yet, skip the
      # rest and let the job succeed (so scheduled/push runs stay green).
      - name: Preflight — check signing secrets
        id: pre
        run: |
          if [ -z "${{ secrets.ASC_KEY_ID }}" ] || [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "::notice::Signing secrets not set yet — skipping the TestFlight build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # XcodeGen emits the newest project format (objectVersion 77), so select the
      # newest installed Xcode (16.x) — older Xcode can't read that format.
      - name: Select newest Xcode
        if: steps.pre.outputs.skip != 'true'
        run: |
          XC="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Using $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Install XcodeGen
        if: steps.pre.outputs.skip != 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.pre.outputs.skip != 'true'
        run: xcodegen generate

      - name: Write App Store Connect API key
        if: steps.pre.outputs.skip != 'true'
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > "$KEYDIR/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Archive
        if: steps.pre.outputs.skip != 'true'
        run: |
          xcodebuild \
            -project MarqueeTV.xcodeproj \
            -scheme MarqueeTV \
            -sdk appletvos \
            -configuration Release \
            -archivePath "$PWD/build/MarqueeTV.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            archive

      - name: Export .ipa
        if: steps.pre.outputs.skip != 'true'
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/MarqueeTV.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        if: steps.pre.outputs.skip != 'true'
        run: |
          xcrun altool --upload-app -t tvos \
            -f "$PWD/build/export/MarqueeTV.ipa" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
