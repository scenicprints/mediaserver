name: Android TV app

# Builds a sideloadable debug APK of the Marquee TV WebView shell and publishes
# it to a rolling "marquee-tv-latest" release so it can be downloaded onto the TV.
on:
  push:
    paths:
      - 'androidtv/**'
      - '.github/workflows/androidtv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: androidtv
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marquee-tv-debug
          path: androidtv/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: marquee-tv-latest
          name: Marquee TV (latest)
          files: androidtv/app/build/outputs/apk/debug/app-debug.apk
