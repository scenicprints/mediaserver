<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Library</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="brand">My Library</h1>
    <input id="search" class="search" type="search" placeholder="Search movies…" />
    <div class="spacer"></div>
    <button id="update-pill" class="pill-update hidden">⟳ Update available</button>
    <button id="rescan" class="btn">Rescan</button>
    <button id="settings-btn" class="btn" title="Settings">⚙ Folders</button>
  </header>

  <main id="grid" class="grid"></main>

  <!-- Settings: manage which folders are Movies vs TV Shows -->
  <div id="settings" class="modal hidden">
    <div class="sheet">
      <button class="close" data-close="settings" aria-label="Close">✕</button>
      <h2>Library folders</h2>
      <p class="muted">Add the folders your media lives in. Sub-folders are included automatically.</p>

      <div class="add-row">
        <button class="btn primary" data-add="movie">＋ Add Movies folder</button>
        <button class="btn primary" data-add="tv">＋ Add TV Shows folder</button>
      </div>

      <div id="lib-list" class="lib-list"></div>

      <div class="settings-footer">
        <span class="muted" id="version">version …</span>
        <button class="btn" id="update-btn">⟳ Update app</button>
      </div>
    </div>
  </div>

  <!-- Folder picker: browse the server's drives/folders -->
  <div id="picker" class="modal hidden">
    <div class="sheet">
      <button class="close" data-close="picker" aria-label="Close">✕</button>
      <h2 id="picker-title">Choose a folder</h2>
      <div class="picker-path" id="picker-path"></div>
      <div class="picker-list" id="picker-list"></div>
      <div class="picker-actions">
        <button class="btn" id="picker-up">↑ Up</button>
        <div class="spacer"></div>
        <button class="btn primary" id="picker-choose">Use this folder</button>
      </div>
    </div>
  </div>

  <div id="detail" class="detail hidden">
    <button id="close" class="close" aria-label="Close">✕</button>
    <div class="detail-inner" id="detail-inner"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
